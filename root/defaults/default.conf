server {
  listen 3000 default_server;
  listen [::]:3000 default_server;

  set $pw_enabled PW_ENABLED;
  set $pw_ok 1;
  if ($pw_enabled = 1) {
    set $pw_ok 0;
  }
  if ($cookie_selkies_pin = "PW_TOKEN") {
    set $pw_ok 1;
  }
  if ($request_uri ~ "^PW_PREFIXauth/(pin|logout)(\\?.*)?$") {
    set $pw_ok 1;
  }
  if ($request_uri ~ "^PW_PREFIX(auth/_pin_page|icon\\.png|favicon\\.ico|manifest\\.json)$") {
    set $pw_ok 1;
  }

  location = PW_PREFIXauth/_pin_page {
    internal;
    add_header Cache-Control "no-store";
    root /usr/share/selkies/www;
    try_files /password-login.html =404;
  }

  location = PW_PREFIXauth/pin {
    if ($request_method != POST) {
      return 405;
    }
    if ($pw_enabled = 0) {
      return 204;
    }
    if ($http_x_pin = "PW_PASSWORD") {
      add_header Set-Cookie "selkies_pin=PW_TOKEN; Path=PW_COOKIE_PATH; HttpOnly; SameSite=Lax";
      return 204;
    }
    return 401;
  }

  location = PW_PREFIXauth/logout {
    add_header Set-Cookie "selkies_pin=; Path=PW_COOKIE_PATH; Max-Age=0; HttpOnly; SameSite=Lax";
    return 204;
  }

  location SUBFOLDER {
    error_page 418 =200 PW_PREFIXauth/_pin_page;
    if ($pw_ok = 0) {
      return 418;
    }
    alias /usr/share/selkies/web/;
    index  index.html index.htm;
    try_files $uri $uri/ =404;
  }
  location /devmode {
    if ($pw_ok = 0) {
      return 401;
    }
    proxy_set_header        Upgrade $http_upgrade;
    proxy_set_header        Connection "upgrade";
    proxy_set_header        Host $host;
    proxy_set_header        X-Real-IP $remote_addr;
    proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_http_version      1.1;
    proxy_read_timeout      3600s;
    proxy_send_timeout      3600s;
    proxy_connect_timeout   3600s;
    proxy_buffering         off;
    client_max_body_size    10M;
    proxy_pass              http://127.0.0.1:5173;
  }
  location SUBFOLDERwebsocket {
    if ($pw_ok = 0) {
      return 401;
    }
    proxy_set_header        Upgrade $http_upgrade;
    proxy_set_header        Connection "upgrade";
    proxy_set_header        Host $host;
    proxy_set_header        X-Real-IP $remote_addr;
    proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_http_version      1.1;
    proxy_read_timeout      3600s;
    proxy_send_timeout      3600s;
    proxy_connect_timeout   3600s;
    proxy_buffering         off;
    client_max_body_size    10M;
    proxy_pass              http://127.0.0.1:CWS;
  }
  location SUBFOLDERapi/local-link/ {
    if ($pw_ok = 0) {
      return 401;
    }
    proxy_set_header        Host $host;
    proxy_set_header        X-Real-IP $remote_addr;
    proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_http_version      1.1;
    proxy_read_timeout      30s;
    proxy_send_timeout      30s;
    proxy_connect_timeout   5s;
    proxy_buffering         off;
    proxy_pass              http://127.0.0.1:CLINK/;
  }
  location SUBFOLDERfiles {
    if ($pw_ok = 0) {
      return 401;
    }
    fancyindex on;
    fancyindex_footer SUBFOLDERnginx/footer.html;
    fancyindex_header SUBFOLDERnginx/header.html;
    alias REPLACE_DOWNLOADS_PATH/;
    if (-f $request_filename) {
        add_header Content-Disposition "attachment";
        add_header X-Content-Type-Options "nosniff";
    }
  }
  error_page 500 502 503 504 /50x.html;
  location = SUBFOLDER50x.html {
    root /usr/share/selkies/web/;
  }
}

